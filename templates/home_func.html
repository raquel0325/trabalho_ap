<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vagas Conecta - Home Funcionário</title>
    <link rel="stylesheet" href="../static/css/home.css">
</head>
<body>
    <div class="container">
        <div class="menu">
            <div class="logo">
                <h2>Vagas Conecta</h2>
            </div>
            <div class="btn-main-group">
                <button class="btn-main ativo" onclick="mudar('home')">Home</button>
                <button class="btn-main" onclick="mudar('vagas')">Vagas</button>
                <button class="btn-main" onclick="mudar('perfil')">Meu Perfil</button>
                <button class="btn-main" onclick="window.location.href='/logout'">Sair</button>
            </div>
        </div>

        <div class="continf">
            <!-- Seção Home -->
            <div id="secao1" class="vagas">
                <h2>Bem-vindo, {{ nome }}!</h2>
                <p>Tipo: {{ tipo }}</p>
                <p>Encontre as melhores vagas para você!</p>
            </div>

            <!-- Seção Vagas -->
            <div id="secao2" class="conteudo hidden">
                <h2>Vagas Disponíveis</h2>
                <p>Em breve - Lista de vagas aparecerá aqui</p>
            </div>

            <!-- Seção Perfil -->
            <div id="secao3" class="conteudo hidden">
                <h2>Meu Perfil</h2>
                <p>Seus dados serão exibidos aqui</p>
            </div>
        </div>
    </div>

    </script>
</body>
</html>
